name: Create Release on Tag

on:
  push:
    tags:
      - 'v*'   # adjust pattern to match your tagging scheme

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release from tag
        uses: ghalactic/github-release-from-tag@v5
        with:
          prerelease: "auto"
          draft: "false"
